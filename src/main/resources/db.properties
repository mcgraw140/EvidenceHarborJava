# Evidence Harbor Database Configuration
# This file is bundled with the software and contains database connection settings.
# Edit these values to point to your MariaDB instance (local or via Tailscale).

# Database Server Host
# For local install: 127.0.0.1
# For Tailscale: enter the Tailscale IP of the server (e.g., 100.64.1.5)
mariadb.host=127.0.0.1

# Database Server Port (default MariaDB port is 3306)
mariadb.port=3306

# Database Name (usually evidence_harbor)
mariadb.database=evidence_harbor

# MariaDB Username
mariadb.user=root

# MariaDB Password
mariadb.password=cpd
